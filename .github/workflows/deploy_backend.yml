name: Deploy backend + migrate database

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest code
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          curl -s -X POST \
            --data-urlencode "command=cd /home/$PYTHONANYWHERE_USERNAME/myapp && git pull origin main" \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/consoles/

      - name: Install dependencies
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          curl -s -X POST \
            --data-urlencode "command=cd /home/$PYTHONANYWHERE_USERNAME/myapp && pip install -r requirements.txt --user" \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/consoles/

      - name: Reload web app
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          curl -s -X POST \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/webapps/$PYTHONANYWHERE_USERNAME.pythonanywhere.com/reload/

      - name: Set environment variables
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"environment_variables": {"DEV_TOKEN": "${{ secrets.DEV_TOKEN }}", "GOOGLE_CLIENT_ID": "${{ secrets.GOOGLE_CLIENT_ID }}"}}' \
            https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/webapps/$PYTHONANYWHERE_USERNAME.pythonanywhere.com/

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          wranglerVersion: "4.1.0"
          command: d1 migrations apply pirate-pantry-db --remote
        env:
          WRANGLER_LOG: debug