name: Deploy backend + migrate database

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create wrangler.toml
        env:
          D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          {
            echo 'name = "pirate-pantry-backend"'
            echo ''
            echo '[[d1_databases]]'
            echo 'binding = "DB"'
            echo 'database_name = "pirate-pantry-db"'
            echo "database_id = \"$D1_DATABASE_ID\""
            echo 'migrations_dir = "migrations"'
          } > backend/wrangler.toml
          echo "--- wrangler.toml contents (ID masked) ---"
          sed 's/database_id = .*/database_id = [REDACTED]/' backend/wrangler.toml

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          wranglerVersion: "4.81.1"
          command: d1 migrations apply pirate-pantry-db --remote

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Pull code and install dependencies
        env:
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PA_USER: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          BASE="https://www.pythonanywhere.com/api/v0/user/$PA_USER"

          # Kill all existing consoles to avoid hitting free-tier limit (max 2)
          EXISTING=$(curl -s -H "Authorization: Token $PA_TOKEN" "$BASE/consoles/")
          echo "$EXISTING" | python3 -c "
import sys, json, urllib.request
data = json.load(sys.stdin)
for c in data:
    req = urllib.request.Request(
        'https://www.pythonanywhere.com/api/v0/user/' + '$PA_USER' + '/consoles/' + str(c['id']) + '/',
        method='DELETE',
        headers={'Authorization': 'Token $PA_TOKEN'}
    )
    print('Deleting console', c['id'])
    urllib.request.urlopen(req)
" || true
          sleep 2

          # Create a fresh bash console
          CONSOLE_RESP=$(curl -s -X POST \
            -H "Authorization: Token $PA_TOKEN" \
            "$BASE/consoles/" \
            -d "executable=bash" -d "arguments=")
          echo "Console response: $CONSOLE_RESP"

          CONSOLE_ID=$(echo "$CONSOLE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          OUTPUT_URL=$(echo "$CONSOLE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['output_url'])")
          echo "Console ID: $CONSOLE_ID"
          sleep 3

          # Send commands; echo marker when done
          curl -s -X POST \
            -H "Authorization: Token $PA_TOKEN" \
            "$BASE/consoles/$CONSOLE_ID/send_input/" \
            --data-urlencode $'input=cd ~/myapp && git pull origin main && pip3.10 install -r backend/requirements.txt --user && echo "::DEPLOY_DONE::"\n'

          # Poll up to 2.5 minutes for the marker
          for i in $(seq 1 30); do
            sleep 5
            OUTPUT=$(curl -s -H "Authorization: Token $PA_TOKEN" "$OUTPUT_URL")
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "::DEPLOY_DONE::"; then
              echo "Deploy commands completed"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for deploy commands"
              exit 1
            fi
          done

          # Clean up console
          curl -s -X DELETE \
            -H "Authorization: Token $PA_TOKEN" \
            "$BASE/consoles/$CONSOLE_ID/" || true

      # Reload the WSGI app via the PA REST API
      - name: Reload web app
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
        run: |
          curl -f -s -X POST \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            "https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/webapps/$PYTHONANYWHERE_USERNAME.pythonanywhere.com/reload/"

      # Build JSON with jq so that special characters in secret values can't
      # break the payload (avoids injection via raw string interpolation)
      - name: Update environment variables
        env:
          PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
          PYTHONANYWHERE_USERNAME: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          DEV_TOKEN: ${{ secrets.DEV_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          payload=$(jq -n \
            --arg dev_token "$DEV_TOKEN" \
            --arg google_client_id "$GOOGLE_CLIENT_ID" \
            '{"environment_variables": {"DEV_TOKEN": $dev_token, "GOOGLE_CLIENT_ID": $google_client_id}}')
          curl -f -s -X PATCH \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://www.pythonanywhere.com/api/v0/user/$PYTHONANYWHERE_USERNAME/webapps/$PYTHONANYWHERE_USERNAME.pythonanywhere.com/"
